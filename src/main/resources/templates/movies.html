<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">
<head th:replace="~{fragments/head :: head(#{movies.top.title})}"></head>
<body>
<div th:replace="~{fragments/loader}"></div>
<div class="page">
    <header class="site-header" th:replace="~{fragments/nav :: nav(active='movies')}"></header>

    <h1 th:text="#{movies.title}">Movies.</h1>

    <div th:if="${error}" class="feedback error" th:text="#{${error}}"></div>
    <div th:if="${success}" class="feedback success" th:text="#{${success}}"></div>

    <div class="grid">
        <div>
            <form th:action="@{/movies}" class="filter" method="get">
                <select id="category" name="category" th:aria-label="#{movies.category.all}">
                    <option value="" th:text="#{movies.category.all}">All categories</option>
                    <option value="28" th:selected="${selectedCategory == '28'}" th:text="#{genre.28}">Action</option>
                    <option value="12" th:selected="${selectedCategory == '12'}" th:text="#{genre.12}">Adventure</option>
                    <option value="16" th:selected="${selectedCategory == '16'}" th:text="#{genre.16}">Animation</option>
                    <option value="35" th:selected="${selectedCategory == '35'}" th:text="#{genre.35}">Comedy</option>
                    <option value="80" th:selected="${selectedCategory == '80'}" th:text="#{genre.80}">Crime</option>
                    <option value="99" th:selected="${selectedCategory == '99'}" th:text="#{genre.99}">Documentary</option>
                    <option value="18" th:selected="${selectedCategory == '18'}" th:text="#{genre.18}">Drama</option>
                    <option value="10751" th:selected="${selectedCategory == '10751'}" th:text="#{genre.10751}">Family</option>
                    <option value="14" th:selected="${selectedCategory == '14'}" th:text="#{genre.14}">Fantasy</option>
                    <option value="36" th:selected="${selectedCategory == '36'}" th:text="#{genre.36}">History</option>
                    <option value="27" th:selected="${selectedCategory == '27'}" th:text="#{genre.27}">Horror</option>
                    <option value="10402" th:selected="${selectedCategory == '10402'}" th:text="#{genre.10402}">Music</option>
                    <option value="9648" th:selected="${selectedCategory == '9648'}" th:text="#{genre.9648}">Mystery</option>
                    <option value="10749" th:selected="${selectedCategory == '10749'}" th:text="#{genre.10749}">Romance</option>
                    <option value="878" th:selected="${selectedCategory == '878'}" th:text="#{genre.878}">Science Fiction</option>
                    <option value="53" th:selected="${selectedCategory == '53'}" th:text="#{genre.53}">Thriller</option>
                    <option value="10770" th:selected="${selectedCategory == '10770'}" th:text="#{genre.10770}">TV Movie</option>
                    <option value="10752" th:selected="${selectedCategory == '10752'}" th:text="#{genre.10752}">War</option>
                    <option value="37" th:selected="${selectedCategory == '37'}" th:text="#{genre.37}">Western</option>
                </select>
                <input id="name" name="name" type="text" th:value="${selectedName}" th:placeholder="#{movies.search.placeholder}" th:aria-label="#{movies.search.placeholder}">
                <select id="limit" name="limit" th:aria-label="#{movies.refresh.ranking}" style="width: auto; min-width: 0;">
                    <option value="5" th:selected="${selectedLimit == 5}">5</option>
                    <option value="10" th:selected="${selectedLimit == null || selectedLimit == 10}">10</option>
                    <option value="25" th:selected="${selectedLimit == 25}">25</option>
                    <option value="50" th:selected="${selectedLimit == 50}">50</option>
                    <option value="100" th:selected="${selectedLimit == 100}">100</option>
                </select>
                <button class="primary" type="submit" th:aria-label="#{movies.refresh.ranking}">
                    <i data-lucide="search" aria-hidden="true"></i>
                </button>
            </form>

            <div th:if="${tops != null}">
                <div th:if="${#lists.isEmpty(tops)}" class="card" th:text="#{movies.empty.filter}">No rated movies yet for this filter.</div>
                <a th:href="@{'/movie/' + ${m.tmdbId}}" th:each="m, iterStat : ${tops}" class="card flex separate">
                    <div class="flex gap-lg">
                        <img th:src="@{'https://image.tmdb.org/t/p/w185' + ${m.posterPath}}" th:alt="'Poster of ' + ${m.title}">
                        <div>
                            <span class="rank" th:text="${m.rank}">#1</span>
                            <span class="title" th:text="${m.title}">Title</span>
                            <span class="year" th:text="${m.releaseYear != null} ? ${m.releaseYear} : #{movies.year.unknown}">Year</span>
                            <br>
                            <br>
                            <div th:if="${!#lists.isEmpty(m.genreIds)}" class="flex gap wrap">
                                <span class="tag" th:each="genreId : ${m.genreIds}" th:text="#{${'genre.' + genreId}}">Genre</span>
                            </div>
                        </div>
                    </div>
                    <span class="rating" th:text="${#strings.replace(#numbers.formatDecimal(m.averageScore, 1, 2), ',', '.')}">0.00</span>
                </a>
            </div>
        </div>

        <div>
            <div th:if="${releasedPremieres != null and !#lists.isEmpty(releasedPremieres)}">
                <h3 th:text="#{movies.premieres.released}">Released</h3>
                <div class="separator"></div>
                <a th:href="@{'/movie/' + ${item.tmdbId}}" th:each="item : ${releasedPremieres}" class="card">
                    <span class="title" th:text="${item.title}">Title</span>
                    <br>
                    <span class="date released" th:text="${#temporals.format(item.releaseDate, 'MMM d, yyyy')}">Released</span>
                </a>
            </div>

            <div th:if="${upcomingPremieres != null and !#lists.isEmpty(upcomingPremieres)}">
                <h3 th:text="#{movies.premieres.upcoming}">Upcoming</h3>
                <div class="separator"></div>
                <a th:href="@{'/movie/' + ${item.tmdbId}}" th:each="item : ${upcomingPremieres}" class="card">
                    <span class="title" th:text="${item.title}">Title</span>
                    <br>
                    <span class="date" th:text="${#temporals.format(item.releaseDate, 'MMM d, yyyy')}">Released</span>
                </a>
            </div>

            <div th:if="${noDatePremieres != null and !#lists.isEmpty(noDatePremieres)}">
                <h3 th:text="#{movies.premieres.no.date}">No release date yet</h3>
                <div class="separator"></div>
                <a th:href="@{'/movie/' + ${item.tmdbId}}" th:each="item : ${noDatePremieres}" class="card">
                    <span class="title" th:text="${item.title}">Title</span>
                </a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
