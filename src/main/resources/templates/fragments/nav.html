<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">
<body>
<header class="site-header" th:fragment="nav(active)">
    <div class="nav-brand">
        <a href="/" class="nav-monogram" th:aria-label="#{nav.home}"><img src="/img/logo.svg" th:alt="#{app.name}"></a>
    </div>
    <button class="nav-hamburger" th:aria-label="#{nav.toggle.menu}" aria-expanded="false" th:if="${#authentication.isAuthenticated() and #authentication.name != 'anonymousUser'}">
        <span class="hamburger-line"></span>
        <span class="hamburger-line"></span>
        <span class="hamburger-line"></span>
    </button>
    <div class="nav-mobile-menu">
        <nav class="nav-links" th:if="${#authentication.isAuthenticated() and #authentication.name != 'anonymousUser'}">
            <a class="nav-link" href="/movies" th:text="#{nav.movies}">Movies</a>
            <a class="nav-link" href="/tvshows" th:text="#{nav.tvshows}">TV Shows</a>
            <a class="nav-link" href="/community" th:text="#{nav.community}">Community</a>
        </nav>
        <div class="nav-auth" th:if="${#authentication.isAuthenticated() and #authentication.name != 'anonymousUser'}">
            <a href="/profile" class="nav-link profile-button" th:aria-label="#{nav.profile}">
                <i data-lucide="user" aria-hidden="true"></i>
            </a>
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="nav-link logout-button" th:aria-label="#{auth.logout}">
                    <i data-lucide="log-out" aria-hidden="true"></i>
                </button>
            </form>
        </div>
    </div>
    <script>
        (function() {
            var hamburger = document.querySelector('.nav-hamburger');
            var mobileMenu = document.querySelector('.nav-mobile-menu');
            if (hamburger && mobileMenu) {
                hamburger.addEventListener('click', function() {
                    var expanded = hamburger.getAttribute('aria-expanded') === 'true';
                    hamburger.setAttribute('aria-expanded', !expanded);
                    hamburger.classList.toggle('active');
                    mobileMenu.classList.toggle('open');
                });
                document.addEventListener('click', function(e) {
                    if (!hamburger.contains(e.target) && !mobileMenu.contains(e.target)) {
                        hamburger.setAttribute('aria-expanded', 'false');
                        hamburger.classList.remove('active');
                        mobileMenu.classList.remove('open');
                    }
                });
            }
        })();
    </script>
</header>
</body>
</html>
