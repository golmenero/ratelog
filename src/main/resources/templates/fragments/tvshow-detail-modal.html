<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>

<th:block th:fragment="tvshowDetailModal">
    <div id="detail-modal-tvshow" class="search-detail-modal">
        <div class="search-detail-modal-content">
            <button class="modal-close" aria-label="Close"><i data-lucide="x"></i></button>
            <div class="modal-header">
                <h2 id="tv-modal-title" class="modal-title"></h2>
                <span id="tv-modal-year" class="modal-year"></span>
            </div>
            <div id="tv-modal-seasons" class="modal-seasons"></div>
            <div id="tv-modal-actions" class="detail-modal-actions"></div>
        </div>
    </div>

    <script>
        const tvModal = document.getElementById('detail-modal-tvshow');

        function populateTvModal(card) {
            document.getElementById('tv-modal-title').textContent = card.dataset.title;
            document.getElementById('tv-modal-year').textContent = card.dataset.year || 'Unknown year';

            const seasonsContainer = document.getElementById('tv-modal-seasons');
            seasonsContainer.innerHTML = '';
            const seasonsData = card.dataset.seasonRatings;
            if (seasonsData && seasonsData.trim() !== '') {
                seasonsData.split(';').forEach(s => {
                    const [num, dir, cam, act, snd, scr, sc] = s.split(',').map(Number);
                    const row = document.createElement('div');
                    row.className = 'season-row';
                    row.innerHTML = `
                        <span class="season-label">Season ${num}</span>
                        <div class="season-ratings">
                            <span class="season-cat"><i data-lucide="clapperboard"></i> ${dir.toFixed(2)}</span>
                            <span class="season-cat"><i data-lucide="camera"></i> ${cam.toFixed(2)}</span>
                            <span class="season-cat"><i data-lucide="hat-glasses"></i> ${act.toFixed(2)}</span>
                            <span class="season-cat"><i data-lucide="music"></i> ${snd.toFixed(2)}</span>
                            <span class="season-cat"><i data-lucide="file-text"></i> ${scr.toFixed(2)}</span>
                            <span class="season-score">${sc.toFixed(2)}</span>
                        </div>`;
                    seasonsContainer.appendChild(row);
                });
            } else {
                seasonsContainer.innerHTML = '<div class="empty-state">No seasons rated yet.</div>';
            }

            const actions = document.getElementById('tv-modal-actions');
            actions.innerHTML = '';
            if (card.dataset.canRate === 'true') {
                const a = document.createElement('a');
                a.href = '/tv/rate?id=' + card.dataset.tmdbId;
                a.className = 'raterr-btn';
                a.innerHTML = '<i data-lucide="star"></i>';
                actions.appendChild(a);
            }
            if (card.dataset.canFollow === 'true') {
                const f = document.createElement('form');
                f.action = '/tvshow/follow'; f.method = 'post'; f.style.display = 'inline';
                f.innerHTML = `<input type="hidden" name="tmdbId" value="${card.dataset.tmdbId}" />
                    <input type="hidden" name="q" value="${card.dataset.query}" />
                    <button type="submit" class="raterr-btn ${card.dataset.isFollowed === 'true' ? 'green' : ''}"><i data-lucide="heart"></i></button>`;
                actions.appendChild(f);
            }
        }

        tvModal.addEventListener('click', (e) => {
            if (e.target === tvModal || e.target.closest('.modal-close')) tvModal.classList.remove('visible');
        });
    </script>
</th:block>

</body>
</html>
