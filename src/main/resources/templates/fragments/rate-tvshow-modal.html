<div th:fragment="rateTvShowModal(show)" th:if="${show != null}" id="rateModal" class="modal">
    <div>
        <div class="flex separate top">
            <h2 th:text="${show.name}">TV Show Title</h2>
            <button id="btnCloseModal" type="button">
                <i data-lucide="x"></i>
            </button>
        </div>

        <form th:action="@{/tv/rate}" method="post">
            <input type="hidden" name="tvShowId" th:value="${show.id}">
            <input type="hidden" name="tmdbId" th:value="${show.tmdbId}">

            <label class="flex separate" for="seasonNumber">
                <span><i data-lucide="layers"></i><span th:text="#{modal.season}">Season</span></span>
            </label>
            <select id="seasonNumber" name="seasonNumber">
                <option th:each="season : ${show.seasons}" th:value="${season.seasonNumber}" th:text="${#messages.msg('modal.season.prefix')} + ${season.seasonNumber}" th:selected="${season.seasonNumber == 1}">Season 1</option>
            </select>

            <div class="separator"></div>

            <label class="flex separate" for="directing">
                <span class="flex centered gap"><i data-lucide="clapperboard"></i><span th:text="#{modal.direction}">Direction</span></span>
                <span class="rating-sm" id="directingValue">5.00</span>
            </label>
            <input id="directing" name="directing" type="range" min="1" max="10" step="0.25" value="5" oninput="document.getElementById('directingValue').textContent = parseFloat(this.value).toFixed(2)">

            <div class="separator"></div>

            <label class="flex separate" for="cinematography">
                <span class="flex centered gap"><i data-lucide="camera"></i><span th:text="#{modal.photography}">Photography</span></span>
                <span class="rating-sm" id="cinematographyValue">5.00</span>
            </label>
            <input id="cinematography" name="cinematography" type="range" min="1" max="10" step="0.25" value="5" oninput="document.getElementById('cinematographyValue').textContent = parseFloat(this.value).toFixed(2)">

            <div class="separator"></div>

            <label class="flex separate" for="acting">
                <span class="flex centered gap"><i data-lucide="hat-glasses"></i><span th:text="#{modal.acting}">Acting</span></span>
                <span class="rating-sm" id="actingValue">5.00</span>
            </label>
            <input id="acting" name="acting" type="range" min="1" max="10" step="0.25" value="5" oninput="document.getElementById('actingValue').textContent = parseFloat(this.value).toFixed(2)">

            <div class="separator"></div>

            <label class="flex separate" for="soundtrack">
                <span class="flex centered gap"><i data-lucide="music"></i><span th:text="#{modal.soundtrack}">Soundtrack</span></span>
                <span class="rating-sm" id="soundtrackValue">5.00</span>
            </label>
            <input id="soundtrack" name="soundtrack" type="range" min="1" max="10" step="0.25" value="5" oninput="document.getElementById('soundtrackValue').textContent = parseFloat(this.value).toFixed(2)">

            <div class="separator"></div>

            <label class="flex separate" for="screenplay">
                <span class="flex centered gap"><i data-lucide="file-text"></i><span th:text="#{modal.script}">Script</span></span>
                <span class="rating-sm" id="screenplayValue">5.00</span>
            </label>
            <input id="screenplay" name="screenplay" type="range" min="1" max="10" step="0.25" value="5" oninput="document.getElementById('screenplayValue').textContent = parseFloat(this.value).toFixed(2)">

            <button class="primary full-width" type="submit" th:text="#{profile.save}">Save</button>
        </form>
    </div>
</div>
