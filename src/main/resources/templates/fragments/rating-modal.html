<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>

<th:block th:fragment="ratingModal">
    <div id="rating-modal" class="rating-modal">
        <div class="rating-modal-content">
            <button class="modal-close" aria-label="Close">
                <i data-lucide="x"></i>
            </button>
            <div class="modal-header">
                <h2 id="modal-title" class="modal-title">Title</h2>
                <span id="modal-year" class="modal-year">Year</span>
            </div>
            <div class="modal-seasons" id="modal-seasons">
                <div class="season-row" th:each="season : ${seasons}">
                    <span class="season-label">Season <span th:text="${season.seasonNumber}">1</span></span>
                    <div class="season-ratings">
                        <span class="season-cat"><i data-lucide="clapperboard" class="category-icon"></i> <span th:text="${#strings.replace(#numbers.formatDecimal(season.directing, 1, 2), ',', '.')}">0.0</span></span>
                        <span class="season-cat"><i data-lucide="camera" class="category-icon"></i> <span th:text="${#strings.replace(#numbers.formatDecimal(season.cinematography, 1, 2), ',', '.')}">0.0</span></span>
                        <span class="season-cat"><i data-lucide="hat-glasses" class="category-icon"></i> <span th:text="${#strings.replace(#numbers.formatDecimal(season.acting, 1, 2), ',', '.')}">0.0</span></span>
                        <span class="season-cat"><i data-lucide="music" class="category-icon"></i> <span th:text="${#strings.replace(#numbers.formatDecimal(season.soundtrack, 1, 2), ',', '.')}">0.0</span></span>
                        <span class="season-cat"><i data-lucide="file-text" class="category-icon"></i> <span th:text="${#strings.replace(#numbers.formatDecimal(season.screenplay, 1, 2), ',', '.')}">0.0</span></span>
                        <span class="season-score" th:text="${#strings.replace(#numbers.formatDecimal(season.score, 1, 2), ',', '.')}">0.0</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.querySelectorAll('.top-title-clickable').forEach(title => {
            title.addEventListener('click', () => {
                const modal = document.getElementById('rating-modal');
                document.getElementById('modal-title').textContent = title.dataset.title;
                document.getElementById('modal-year').textContent = title.dataset.year || 'Unknown year';
                
                const seasonsContainer = document.getElementById('modal-seasons');
                seasonsContainer.innerHTML = '';
                
                if (title.dataset.seasons) {
                    title.dataset.seasons.split(';').forEach(s => {
                        const parts = s.split(',');
                        const [seasonNum, directing, cinematography, acting, soundtrack, screenplay, score] = parts.map(Number);
                        const row = document.createElement('div');
                        row.className = 'season-row';
                        row.innerHTML = `
                            <span class="season-label">Season ${seasonNum}</span>
                            <div class="season-ratings">
                                <span class="season-cat">D: ${directing.toFixed(2)}</span>
                                <span class="season-cat">C: ${cinematography.toFixed(2)}</span>
                                <span class="season-cat">A: ${acting.toFixed(2)}</span>
                                <span class="season-cat">S: ${soundtrack.toFixed(2)}</span>
                                <span class="season-cat">Sc: ${screenplay.toFixed(2)}</span>
                                <span class="season-score">${score.toFixed(2)}</span>
                            </div>
                        `;
                        seasonsContainer.appendChild(row);
                    });
                }
                
                modal.classList.add('visible');
                lucide.createIcons();
            });
        });

        document.getElementById('rating-modal').addEventListener('click', (e) => {
            if (e.target === e.currentTarget || e.target.closest('.modal-close')) {
                e.currentTarget.classList.remove('visible');
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                document.getElementById('rating-modal').classList.remove('visible');
            }
        });
    </script>
</th:block>

</body>
</html>
