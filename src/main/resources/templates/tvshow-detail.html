<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raterr - TV Show Detail</title>
    <link rel="stylesheet" href="/styles.css">
    <script src="/lucide.min.js"></script>
</head>
<body>
<div class="page-shell">
    <header class="site-header" th:replace="~{fragments/nav :: nav(active='tvshows')}"></header>

    <main class="main-stack">
        <section class="hero-card">
            <div class="hero-content">
                <div>
                    <h1 class="hero-title" id="title">
                        <span th:text="${show != null} ? ${show.name} : 'TV show not found'">Loading TV show...</span>
                        <span th:if="${show != null && show.firstAirYear != null}" class="hero-year" th:text="${show.firstAirYear}">Year</span>
                    </h1>
                </div>
            </div>
        </section>

        <article th:if="${show != null}" class="show-detail-card" id="showSummary">
            <div class="poster-frame show-detail-poster">
                <img th:if="${show.posterPath != null}" th:src="@{'https://image.tmdb.org/t/p/w185' + ${show.posterPath}}" th:alt="'Poster of ' + ${show.name}">
                <div th:unless="${show.posterPath != null}" class="poster-fallback" th:text="${#strings.toUpperCase(#strings.substring(show.name, 0, 1))}">?</div>
            </div>
            <div class="show-detail-body">
                <p class="show-detail-overview muted" id="showOverview" th:text="${show.overview != null and show.overview.trim().length() > 0} ? ${show.overview} : 'No synopsis available for this title.'">Loading TV show information.</p>
                <div th:if="${!#lists.isEmpty(show.genres)}" class="genre-tags">
                    <span th:each="genre : ${show.genres}" class="genre-tag" th:text="${genre}">Genre</span>
                </div>
            </div>
            <div class="show-detail-actions">
                <form th:action="@{/tvshow/follow}" method="post">
                    <input type="hidden" name="tvShowId" th:value="${show.id}" />
                    <button type="submit" th:class="${show.isFollowed} ? 'raterr-btn green' : 'raterr-btn'">
                        <i data-lucide="heart"></i>
                    </button>
                </form>
            </div>
            <div th:if="${show.overallScore != null}" class="show-detail-rating">
                <span class="rating-display-score" th:text="${#strings.replace(#numbers.formatDecimal(show.overallScore, 1, 2), ',', '.')}">0.00</span>
                <span class="rating-display-label">Your Rating</span>
            </div>
        </article>

        <div th:if="${show != null && !#lists.isEmpty(show.seasons)}" class="seasons-card">
            <div th:each="season : ${show.seasons}" class="season-row">
                <span class="season-row-label" th:text="'S' + ${season.seasonNumber}">S1</span>
                <div th:if="${season.hasRating}" class="season-row-rated">
                    <div class="rating-cat rating-cat-score">
                        <i data-lucide="star"></i>
                        <span th:text="${#strings.replace(#numbers.formatDecimal(season.score, 1, 2), ',', '.')}">0.00</span>
                    </div>
                    <div class="rating-cat">
                        <i data-lucide="clapperboard"></i>
                        <span th:text="${#strings.replace(#numbers.formatDecimal(season.directing, 1, 2), ',', '.')}">0.00</span>
                    </div>
                    <div class="rating-cat">
                        <i data-lucide="camera"></i>
                        <span th:text="${#strings.replace(#numbers.formatDecimal(season.cinematography, 1, 2), ',', '.')}">0.00</span>
                    </div>
                    <div class="rating-cat">
                        <i data-lucide="hat-glasses"></i>
                        <span th:text="${#strings.replace(#numbers.formatDecimal(season.acting, 1, 2), ',', '.')}">0.00</span>
                    </div>
                    <div class="rating-cat">
                        <i data-lucide="music"></i>
                        <span th:text="${#strings.replace(#numbers.formatDecimal(season.soundtrack, 1, 2), ',', '.')}">0.00</span>
                    </div>
                    <div class="rating-cat">
                        <i data-lucide="file-text"></i>
                        <span th:text="${#strings.replace(#numbers.formatDecimal(season.screenplay, 1, 2), ',', '.')}">0.00</span>
                    </div>
                    <form th:action="@{'/tvshows/delete/' + ${show.id}}" method="post" class="season-delete-form">
                        <input type="hidden" name="seasonNumber" th:value="${season.seasonNumber}" />
                        <button type="submit" class="raterr-btn" aria-label="Delete rating">
                            <i data-lucide="trash"></i>
                        </button>
                    </form>
                </div>
                <button th:unless="${season.hasRating}" class="raterr-btn season-rate-btn" th:data-season="${season.seasonNumber}">
                    <i data-lucide="star"></i>
                </button>
            </div>
        </div>

        <div th:if="${error}" id="msg" class="feedback error" th:text="${error}"></div>
        <div th:if="${success}" id="msg" class="feedback success" th:text="${success}"></div>
    </main>

    <div th:replace="~{fragments/rate-tvshow-modal :: rateTvShowModal(${show})}"></div>
</div>
</body>
<script>
    lucide.createIcons();

    const btnOpenRateModal = document.getElementById('btnOpenRateModal');
    const btnCloseModal = document.getElementById('btnCloseModal');
    const rateModal = document.getElementById('rateModal');
    const seasonSelect = document.getElementById('seasonNumber');

    if (btnOpenRateModal) {
        btnOpenRateModal.addEventListener('click', () => {
            rateModal.classList.add('visible');
        });
    }

    document.querySelectorAll('.season-rate-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const season = btn.getAttribute('data-season');
            if (seasonSelect) {
                seasonSelect.value = season;
            }
            rateModal.classList.add('visible');
        });
    });

    if (btnCloseModal) {
        btnCloseModal.addEventListener('click', () => {
            rateModal.classList.remove('visible');
        });
    }

    if (rateModal) {
        rateModal.addEventListener('click', (e) => {
            if (e.target === rateModal) {
                rateModal.classList.remove('visible');
            }
        });
    }
</script>
</html>
