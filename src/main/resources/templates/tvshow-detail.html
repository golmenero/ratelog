<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{tvshow.detail.title}">Ratelog - TV Show Detail</title>
    <link rel="stylesheet" href="/styles.css">
    <script src="/lucide.min.js"></script>
</head>
<body>
<div class="page">
    <header class="site-header" th:replace="~{fragments/nav :: nav(active='tvshows')}"></header>

    <h1>
        <span th:text="${show != null} ? ${show.name} : #{tvshow.detail.not.found}">Loading TV show...</span>
        <span th:if="${show != null && show.firstAirYear != null}" class="year" th:text="${show.firstAirYear}">Year</span>
    </h1>

    <div th:if="${error}" class="feedback error" th:text="${error}"></div>
    <div th:if="${success}" class="feedback success" th:text="${success}"></div>

    <div class="detail-card">
        <div class="flex gap-lg">
            <img th:src="@{'https://image.tmdb.org/t/p/w185' + ${show.posterPath}}" th:alt="'Poster of ' + ${show.name}">
            <div>
                <div class="flex gap-lg separate">
                    <p th:text="${show.overview != null and show.overview.trim().length() > 0} ? ${show.overview} : #{tvshow.detail.no.synopsis}">Loading TV show information.</p>
                    <span th:if="${show.overallScore != null}" class="rating" th:text="${#strings.replace(#numbers.formatDecimal(show.overallScore, 1, 2), ',', '.')}">0.00</span>
                </div>
                <br>
                <div class="flex gap-lg separate">
                    <div th:if="${!#lists.isEmpty(show.genres)}" class="tags">
                        <span th:each="genre : ${show.genres}" th:text="${genre}">Genre</span>
                    </div>
                    <div class="flex gap-lg">
                        <form th:action="@{/tvshow/follow}" method="post">
                            <input type="hidden" name="tvShowId" th:value="${show.id}" />
                            <button type="submit" th:class="${show.isFollowed} ? 'green' : ''">
                                <i data-lucide="heart"></i>
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="separator"></div>

    <div th:if="${show != null && !#lists.isEmpty(show.seasons)}" class="category-card">
        <div th:each="season : ${show.seasons}">
            <div class="flex separate">
                <h3 class="season" th:text="#{tvshows.season.prefix} + ' ' + ${season.seasonNumber}">Season 1</h3>
                <div>
                    <form th:if="${season.hasRating}" th:action="@{'/tvshows/delete/' + ${show.id}}" method="post">
                        <input type="hidden" name="seasonNumber" th:value="${season.seasonNumber}" />
                        <button type="submit" th:aria-label="#{tvshow.detail.delete.rating}">
                            <i data-lucide="trash"></i>
                        </button>
                    </form>
                    <button class="season-rate-btn" th:unless="${season.hasRating}" th:data-season="${season.seasonNumber}">
                        <i data-lucide="star"></i>
                    </button>
                </div>
            </div>
            <p th:text="${season.overview != null and season.overview.trim().length() > 0} ? ${season.overview} : #{tvshow.detail.no.synopsis}">Loading TV show information.</p>
            <br>
            <div th:if="${season.hasRating}" class="flex gap centered">
                <div class="category">
                    <i data-lucide="star"></i>
                    <span th:text="${#strings.replace(#numbers.formatDecimal(season.score, 1, 2), ',', '.')}">0.00</span>
                </div>
                <div class="category">
                    <i data-lucide="clapperboard"></i>
                    <span th:text="${#strings.replace(#numbers.formatDecimal(season.directing, 1, 2), ',', '.')}">0.00</span>
                </div>
                <div class="category">
                    <i data-lucide="camera"></i>
                    <span th:text="${#strings.replace(#numbers.formatDecimal(season.cinematography, 1, 2), ',', '.')}">0.00</span>
                </div>
                <div class="category">
                    <i data-lucide="hat-glasses"></i>
                    <span th:text="${#strings.replace(#numbers.formatDecimal(season.acting, 1, 2), ',', '.')}">0.00</span>
                </div>
                <div class="category">
                    <i data-lucide="music"></i>
                    <span th:text="${#strings.replace(#numbers.formatDecimal(season.soundtrack, 1, 2), ',', '.')}">0.00</span>
                </div>
                <div class="category">
                    <i data-lucide="file-text"></i>
                    <span th:text="${#strings.replace(#numbers.formatDecimal(season.screenplay, 1, 2), ',', '.')}">0.00</span>
                </div>
            </div>
            <div class="separator"></div>
        </div>
    </div>

    <div th:replace="~{fragments/rate-tvshow-modal :: rateTvShowModal(${show})}"></div>
</div>
</body>
<script>
    lucide.createIcons();

    const btnOpenRateModal = document.getElementById('btnOpenRateModal');
    const btnCloseModal = document.getElementById('btnCloseModal');
    const rateModal = document.getElementById('rateModal');
    const seasonSelect = document.getElementById('seasonNumber');

    if (btnOpenRateModal) {
        btnOpenRateModal.addEventListener('click', () => {
            rateModal.classList.add('visible');
        });
    }

    document.querySelectorAll('.season-rate-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const season = btn.getAttribute('data-season');
            if (seasonSelect) {
                seasonSelect.value = season;
            }
            rateModal.classList.add('visible');
        });
    });

    if (btnCloseModal) {
        btnCloseModal.addEventListener('click', () => {
            rateModal.classList.remove('visible');
        });
    }

    if (rateModal) {
        rateModal.addEventListener('click', (e) => {
            if (e.target === rateModal) {
                rateModal.classList.remove('visible');
            }
        });
    }
</script>
</html>
