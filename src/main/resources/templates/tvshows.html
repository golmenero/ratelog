<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">
<head th:replace="~{fragments/head :: head(#{tvshows.title})}"></head>
<body>
<div th:replace="~{fragments/loader}"></div>
<div class="page">
    <header class="site-header" th:replace="~{fragments/nav :: nav(active='tvshows')}"></header>

    <h1 th:text="#{tvshows.title}">TV Shows.</h1>

    <div th:if="${error}" class="feedback error" th:text="${error}"></div>
    <div th:if="${success}" class="feedback success" th:text="${success}"></div>

    <div class="grid">
        <div>
            <form th:action="@{/tvshows}" class="filter" method="get">
                <select id="category" name="category" th:aria-label="#{tvshows.category.all}">
                    <option value="" th:text="#{tvshows.category.all}">All categories</option>
                    <option value="Action" th:selected="${selectedCategory == 'Action'}" th:text="#{genre.action}">Action</option>
                    <option value="Adventure" th:selected="${selectedCategory == 'Adventure'}" th:text="#{genre.adventure}">Adventure</option>
                    <option value="Animation" th:selected="${selectedCategory == 'Animation'}" th:text="#{genre.animation}">Animation</option>
                    <option value="Comedy" th:selected="${selectedCategory == 'Comedy'}" th:text="#{genre.comedy}">Comedy</option>
                    <option value="Crime" th:selected="${selectedCategory == 'Crime'}" th:text="#{genre.crime}">Crime</option>
                    <option value="Documentary" th:selected="${selectedCategory == 'Documentary'}" th:text="#{genre.documentary}">Documentary</option>
                    <option value="Drama" th:selected="${selectedCategory == 'Drama'}" th:text="#{genre.drama}">Drama</option>
                    <option value="Family" th:selected="${selectedCategory == 'Family'}" th:text="#{genre.family}">Family</option>
                    <option value="Fantasy" th:selected="${selectedCategory == 'Fantasy'}" th:text="#{genre.fantasy}">Fantasy</option>
                    <option value="History" th:selected="${selectedCategory == 'History'}" th:text="#{genre.history}">History</option>
                    <option value="Horror" th:selected="${selectedCategory == 'Horror'}" th:text="#{genre.horror}">Horror</option>
                    <option value="Mystery" th:selected="${selectedCategory == 'Mystery'}" th:text="#{genre.mystery}">Mystery</option>
                    <option value="Romance" th:selected="${selectedCategory == 'Romance'}" th:text="#{genre.romance}">Romance</option>
                    <option value="Science Fiction" th:selected="${selectedCategory == 'Science Fiction'}" th:text="#{genre.science.fiction}">Science Fiction</option>
                    <option value="Sci-Fi &amp; Fantasy" th:selected="${selectedCategory == 'Sci-Fi &amp; Fantasy'}" th:text="#{genre.sci.fi.fantasy}">Sci-Fi &amp; Fantasy</option>
                    <option value="Soap" th:selected="${selectedCategory == 'Soap'}" th:text="#{genre.soap}">Soap</option>
                    <option value="Talk" th:selected="${selectedCategory == 'Talk'}" th:text="#{genre.talk}">Talk</option>
                    <option value="Thriller" th:selected="${selectedCategory == 'Thriller'}" th:text="#{genre.thriller}">Thriller</option>
                    <option value="War" th:selected="${selectedCategory == 'War'}" th:text="#{genre.war}">War</option>
                    <option value="War &amp; Politics" th:selected="${selectedCategory == 'War &amp; Politics'}" th:text="#{genre.war.politics}">War &amp; Politics</option>
                    <option value="Western" th:selected="${selectedCategory == 'Western'}" th:text="#{genre.western}">Western</option>
                </select>
                <input id="name" name="name" type="text" th:value="${selectedName}" th:placeholder="#{tvshows.search.placeholder}" th:aria-label="#{tvshows.search.placeholder}">
                <select id="limit" name="limit" th:aria-label="#{tvshows.refresh.ranking}" style="width: auto; min-width: 0;">
                    <option value="5" th:selected="${selectedLimit == 5}">5</option>
                    <option value="10" th:selected="${selectedLimit == null || selectedLimit == 10}">10</option>
                    <option value="25" th:selected="${selectedLimit == 25}">25</option>
                    <option value="50" th:selected="${selectedLimit == 50}">50</option>
                    <option value="100" th:selected="${selectedLimit == 100}">100</option>
                </select>
                <button class="primary" type="submit" th:aria-label="#{tvshows.refresh.ranking}">
                    <i data-lucide="search" aria-hidden="true"></i>
                </button>
            </form>

            <div th:if="${tops != null}">
                <div th:if="${#lists.isEmpty(tops)}" class="empty-card" th:text="#{tvshows.empty.filter}">No rated TV shows yet for this filter.</div>
                <a th:href="@{'/tv/' + ${s.tmdbId}}" th:each="s, iterStat : ${tops}" class="card mb-2">
                    <div>
                        <img th:src="@{'https://image.tmdb.org/t/p/w185' + ${s.posterPath}}" th:alt="'Poster of ' + ${s.name}">
                        <div>
                            <span class="rank" th:text="${s.rank}">#1</span>
                            <span class="title" th:text="${s.name}">Title</span>
                            <span class="year" th:text="${s.firstAirYear != null} ? ${s.firstAirYear} : #{tvshows.year.unknown}">Year</span>
                            <br>
                            <div th:if="${!#lists.isEmpty(s.genres)}" class="tags">
                                <span th:each="genre : ${s.genres}" th:text="${genre}">Genre</span>
                            </div>
                        </div>
                    </div>
                    <span class="rating" th:text="${#strings.replace(#numbers.formatDecimal(s.averageScore, 1, 2), ',', '.')}">0.00</span>
                </a>
            </div>
        </div>

        <div>
            <h2 th:text="#{tvshows.premieres}">Premieres</h2>

            <div th:if="${releasedPremieres != null and !#lists.isEmpty(releasedPremieres)}">
                <div class="separator"></div>
                <h3 th:text="#{tvshows.premieres.released}">Released</h3>
                <a th:href="@{'/tv/' + ${item.tmdbId}}" th:each="item : ${releasedPremieres}" class="premiere-card">
                    <div class="flex separate">
                        <span class="title" th:text="${item.name}">Title</span>
                        <span class="season" th:text="#{tvshows.season.prefix} + ' ' +  ${item.seasonNumber}">S1</span>
                    </div>
                    <span class="date released" th:text="${#temporals.format(item.releaseDate, 'MMM d, yyyy')}">Released</span>
                </a>
            </div>

            <div th:if="${upcomingPremieres != null and !#lists.isEmpty(upcomingPremieres)}">
                <div class="separator"></div>
                <div th:text="#{tvshows.premieres.upcoming}">Upcoming</div>
                <a th:href="@{'/tv/' + ${item.tmdbId}}" th:each="item : ${upcomingPremieres}" class="premiere-card">
                    <div class="flex separate">
                        <span class="title" th:text="${item.name}">Title</span>
                        <span class="season" th:text="#{tvshows.season.prefix} + ' ' +  ${item.seasonNumber}">S1</span>
                    </div>
                    <span class="date" th:text="${#temporals.format(item.releaseDate, 'MMM d, yyyy')}">Released</span>
                </a>
            </div>

            <div th:if="${noDatePremieres != null and !#lists.isEmpty(noDatePremieres)}">
                <div class="separator"></div>
                <div th:text="#{tvshows.premieres.no.date}">No release date yet</div>
                <a th:href="@{'/tv/' + ${item.tmdbId}}" th:each="item : ${noDatePremieres}" class="premiere-card">
                    <div class="flex separate">
                        <span class="title" th:text="${item.name}">Title</span>
                        <span class="season" th:text="#{tvshows.season.prefix} + ' ' +  ${item.seasonNumber}">S1</span>
                    </div>
                </a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
