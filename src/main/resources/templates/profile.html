<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">
<head th:replace="~{fragments/head :: head(#{profile.title})}"></head>
<body>
<div th:replace="~{fragments/loader}"></div>
<div class="page">
    <header class="site-header" th:replace="~{fragments/nav :: nav(active='profile')}"></header>

    <div class="flex centered separate">
        <div class="flex gap-lg centered">
            <div class="avatar" th:text="${#strings.toUpperCase(#strings.substring(username, 0, 1))}">U</div>
            <div>
                <h1 class="w-100" th:text="${username}">Username</h1>
                <p th:if="${isLoggedUser}" th:text="${email}">email@example.com</p>
                <span class="date"><span th:text="#{profile.member.since}">Member since</span> <span th:text="${memberSince}">2024-01-01</span></span>
            </div>
        </div>
        <div>
            <button th:if="${isLoggedUser}" id="btnOpenEditModal" type="button">
                <i data-lucide="pencil"></i>
            </button>
            <form th:unless="${isLoggedUser}" th:action="@{/user/follow}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <input type="hidden" name="id" th:value="${followId}" />
                <button th:class="${isFollowed} ? '' : 'primary'" type="submit" th:title="${isFollowed} ? #{community.unfollow} : #{community.follow}">
                    <i th:data-lucide="${isFollowed} ? 'user-round-x' : 'user-round-check'" aria-hidden="true"></i>
                </button>
            </form>
        </div>
    </div>

    <div class="separator"></div>

    <h2 class="w-100" th:text="#{community.activity.feed}">Recent activity</h2>
    <div>
        <div th:each="item : ${ratings}" class="card">
            <div class="flex separate">
                <a class="link secondary" th:href="${item.type == 'movie'} ? @{'/movie/' + ${item.tmdbId}} : @{'/tv/' + ${item.tmdbId}}">
                    <span class="title" th:text="${item.title}">Title</span>
                    <span class="season" th:if="${item.seasonNumber != null}" th:text="'S' + ${item.seasonNumber}">S1</span>
                </a>
                <div>
                    <span class="rating" th:text="${#strings.replace(#numbers.formatDecimal(item.score, 1, 2), ',', '.')}">0.00</span>
                </div>
            </div>
            <p class="m-0" th:if="${item.reviewText != null}" th:text="${item.reviewText}">Review text</p>
            <br>
            <span class="date">
                <span th:text="#{community.activity.rated.at}">Rated on</span>
                <span th:text="${item.ratedAt}">date</span>
            </span>
        </div>
        <div th:if="${hasMore}">
            <a th:href="@{'/profile/' + ${followId}(limit=${limit + 10})}" class="link flex gap">
                <i data-lucide="chevrons-down"></i>
                <span th:text="#{community.load.more}">Load More</span>
            </a>
        </div>
    </div>

    <footer th:if="${isLoggedUser}" class="bmc-footer">
        <form th:if="${isLoggedUser}" th:action="@{/lang}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <select id="lang" name="lang" onchange="this.form.submit()">
                <option value="en" th:text="#{profile.lang.en}" th:selected="${currentLang == 'en'}">English</option>
                <option value="en" th:text="#{profile.lang.de}" th:selected="${currentLang == 'de'}">Deutsch</option>
                <option value="es" th:text="#{profile.lang.es}" th:selected="${currentLang == 'es'}">Español</option>
                <option value="es" th:text="#{profile.lang.fr}" th:selected="${currentLang == 'fr'}">Français</option>
                <option value="es" th:text="#{profile.lang.it}" th:selected="${currentLang == 'it'}">Italiano</option>
                <option value="es" th:text="#{profile.lang.ja}" th:selected="${currentLang == 'ja'}">日本語</option>
                <option value="es" th:text="#{profile.lang.pt}" th:selected="${currentLang == 'pt'}">Português</option>
                <option value="es" th:text="#{profile.lang.ru}" th:selected="${currentLang == 'ru'}">Русский</option>
                <option value="es" th:text="#{profile.lang.zh}" th:selected="${currentLang == 'zh'}">中文</option>
            </select>
        </form>
        <script type="text/javascript" src="https://cdnjs.buymeacoffee.com/1.0.0/button.prod.min.js" data-name="bmc-button" data-slug="golmenero" data-color="#d97757" data-emoji="" data-font="Bree" data-text="Buy me a coffee" data-outline-color="#FFFFFF" data-font-color="#FFFFFF" data-coffee-color="#FFDD00"></script>
    </footer>

    <div th:replace="~{fragments/edit-user-modal :: editUserModal}"></div>
</div>
</body>
<script>
    const btnOpenEditModal = document.getElementById('btnOpenEditModal');
    const btnCloseEditModal = document.getElementById('btnCloseEditModal');
    const editProfileModal = document.getElementById('editProfileModal');

    btnOpenEditModal.addEventListener('click', () => editProfileModal.classList.add('visible'));
    btnCloseEditModal.addEventListener('click', () => editProfileModal.classList.remove('visible'));

    editProfileModal.addEventListener('click', (e) => {
        if (e.target === editProfileModal) {
            editProfileModal.classList.remove('visible');
        }
    });
</script>
</html>
