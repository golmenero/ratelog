<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raterr - Profile</title>
    <link rel="stylesheet" href="/styles.css">
    <script src="/lucide.min.js"></script>
</head>
<body>
<div class="page-shell">
    <header class="site-header" th:replace="~{fragments/nav :: nav(active='profile')}"></header>

    <div class="profile-layout">
        <div class="profile-main">
            <div class="profile-header">
                <div class="profile-avatar" th:text="${#strings.toUpperCase(#strings.substring(username, 0, 1))}">U</div>
                <div class="profile-details">
                    <h2 class="profile-username" th:text="${username}">Username</h2>
                    <p class="profile-email" th:text="${email}">email@example.com</p>
                    <p class="profile-since" th:text="'Member since ' + ${memberSince}">Member since 2024-01-01</p>
                </div>
            </div>

            <div class="profile-divider"></div>

            <section class="premieres-section" th:if="${(releasedPremieres != null and !#lists.isEmpty(releasedPremieres)) or (upcomingPremieres != null and !#lists.isEmpty(upcomingPremieres)) or (noDatePremieres != null and !#lists.isEmpty(noDatePremieres))}">
                <h2 class="premieres-heading">Your Premieres</h2>
                
                <div class="premieres-group" th:if="${releasedPremieres != null and !#lists.isEmpty(releasedPremieres)}">
                    <div class="premieres-group-label">Released</div>
                    <div class="premiere-timeline">
                        <div th:each="item : ${releasedPremieres}" class="premiere-card premiere-released">
                            <div class="premiere-poster">
                                <img th:if="${item.posterPath != null}" th:src="@{'https://image.tmdb.org/t/p/w92' + ${item.posterPath}}" th:alt="'Poster of ' + ${item.title}">
                                <div th:unless="${item.posterPath != null}" class="premiere-poster-fallback" th:text="${#strings.toUpperCase(#strings.substring(item.title, 0, 1))}">?</div>
                            </div>
                            <div class="premiere-info">
                                <div class="premiere-title-row">
                                    <span class="premiere-name" th:text="${item.title}">Title</span>
                                    <span th:if="${item.type == 'movie'}" class="tag tag-movie" style="font-size: 0.72rem; padding: 4px 8px;">Movie</span>
                                    <span th:if="${item.type == 'tvshow'}" class="tag tag-tvshow" style="font-size: 0.72rem; padding: 4px 8px;">TV</span>
                                </div>
                                <span class="premiere-date premiere-date-released" th:text="'Released ' + ${#temporals.format(item.releaseDate, 'MMM d, yyyy')}">Released</span>
                            </div>
                            <div class="premiere-actions">
                                <a th:if="${item.type == 'movie'}" th:href="@{/movie/rate(id=${item.tmdbId})}" class="raterr-btn" title="Rate">
                                    <i data-lucide="star"></i>
                                </a>
                                <a th:if="${item.type == 'tvshow'}" th:href="@{/tv/rate(id=${item.tmdbId})}" class="raterr-btn" title="Rate">
                                    <i data-lucide="star"></i>
                                </a>
                                <form th:action="@{/follow}" method="post" style="display: inline;">
                                    <input type="hidden" name="tmdbId" th:value="${item.tmdbId}" />
                                    <input type="hidden" name="type" th:value="${item.type}" />
                                    <button type="submit" class="raterr-btn green" title="Unfollow">
                                        <i data-lucide="heart"></i>
                                    </button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="premieres-group" th:if="${upcomingPremieres != null and !#lists.isEmpty(upcomingPremieres)}">
                    <div class="premieres-group-label">Upcoming</div>
                    <div class="premiere-timeline">
                        <div th:each="item : ${upcomingPremieres}" class="premiere-card">
                            <div class="premiere-poster">
                                <img th:if="${item.posterPath != null}" th:src="@{'https://image.tmdb.org/t/p/w92' + ${item.posterPath}}" th:alt="'Poster of ' + ${item.title}">
                                <div th:unless="${item.posterPath != null}" class="premiere-poster-fallback" th:text="${#strings.toUpperCase(#strings.substring(item.title, 0, 1))}">?</div>
                            </div>
                            <div class="premiere-info">
                                <div class="premiere-title-row">
                                    <span class="premiere-name" th:text="${item.title}">Title</span>
                                    <span th:if="${item.type == 'movie'}" class="tag tag-movie" style="font-size: 0.72rem; padding: 4px 8px;">Movie</span>
                                    <span th:if="${item.type == 'tvshow'}" class="tag tag-tvshow" style="font-size: 0.72rem; padding: 4px 8px;">TV</span>
                                </div>
                                <span class="premiere-date" th:text="${#temporals.format(item.releaseDate, 'MMM d, yyyy')}">Date</span>
                            </div>
                            <div class="premiere-actions">
                                <form th:action="@{/follow}" method="post" style="display: inline;">
                                    <input type="hidden" name="tmdbId" th:value="${item.tmdbId}" />
                                    <input type="hidden" name="type" th:value="${item.type}" />
                                    <button type="submit" class="raterr-btn green" title="Unfollow">
                                        <i data-lucide="heart"></i>
                                    </button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="premieres-group" th:if="${noDatePremieres != null and !#lists.isEmpty(noDatePremieres)}">
                    <div class="premieres-group-label">No release date yet</div>
                    <div class="premiere-timeline">
                        <div th:each="item : ${noDatePremieres}" class="premiere-card">
                            <div class="premiere-poster">
                                <img th:if="${item.posterPath != null}" th:src="@{'https://image.tmdb.org/t/p/w92' + ${item.posterPath}}" th:alt="'Poster of ' + ${item.title}">
                                <div th:unless="${item.posterPath != null}" class="premiere-poster-fallback" th:text="${#strings.toUpperCase(#strings.substring(item.title, 0, 1))}">?</div>
                            </div>
                            <div class="premiere-info">
                                <div class="premiere-title-row">
                                    <span class="premiere-name" th:text="${item.title}">Title</span>
                                    <span th:if="${item.type == 'movie'}" class="tag tag-movie" style="font-size: 0.72rem; padding: 4px 8px;">Movie</span>
                                    <span th:if="${item.type == 'tvshow'}" class="tag tag-tvshow" style="font-size: 0.72rem; padding: 4px 8px;">TV</span>
                                </div>
                                <span class="premiere-date">TBA</span>
                            </div>
                            <div class="premiere-actions">
                                <form th:action="@{/follow}" method="post" style="display: inline;">
                                    <input type="hidden" name="tmdbId" th:value="${item.tmdbId}" />
                                    <input type="hidden" name="type" th:value="${item.type}" />
                                    <button type="submit" class="raterr-btn green" title="Unfollow">
                                        <i data-lucide="heart"></i>
                                    </button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <section class="premieres-section" th:if="${(releasedPremieres == null or #lists.isEmpty(releasedPremieres)) and (upcomingPremieres == null or #lists.isEmpty(upcomingPremieres)) and (noDatePremieres == null or #lists.isEmpty(noDatePremieres))}">
                <div class="empty-state">No followed titles yet. Search for movies or TV shows and follow them to see upcoming premieres here.</div>
            </section>
        </div>
    </div>
</div>
</body>
<script>
    lucide.createIcons();
</script>
</html>
