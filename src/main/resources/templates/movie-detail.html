<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{movie.detail.title}">Ratelog - Movie Detail</title>
    <link rel="stylesheet" href="/styles.css">
    <script src="/lucide.min.js"></script>
</head>
<body>
<div class="page">
    <header class="site-header" th:replace="~{fragments/nav :: nav(active='movies')}"></header>

    <h1>
        <span th:text="${movie != null} ? ${movie.name} : #{movie.detail.not.found}">Loading movie...</span>
        <span th:if="${movie != null && movie.firstAirYear != null}" class="year" th:text="${movie.firstAirYear}">Year</span>
    </h1>

    <div th:if="${error}" class="feedback error" th:text="${error}"></div>
    <div th:if="${success}" class="feedback success" th:text="${success}"></div>

    <div class="detail-card">
        <div class="flex gap-lg">
            <img th:src="@{'https://image.tmdb.org/t/p/w185' + ${movie.posterPath}}" th:alt="'Poster of ' + ${movie.name}">
            <div>
                <div class="flex gap-lg separate">
                    <p th:text="${movie.overview != null and movie.overview.trim().length() > 0} ? ${movie.overview} : #{movie.detail.no.synopsis}">Loading movie information.</p>
                    <span th:if="${movie.score != null}" class="rating" th:text="${#strings.replace(#numbers.formatDecimal(movie.score, 1, 2), ',', '.')}">0.00</span>
                </div>
                <br>
                <div class="flex gap-lg separate">
                    <div th:if="${!#lists.isEmpty(movie.genres)}" class="tags">
                        <span th:each="genre : ${movie.genres}" th:text="${genre}">Genre</span>
                    </div>
                    <div class="flex gap-lg">
                        <button th:if="${!movie.hasRating}" id="btnOpenRateModal">
                            <i data-lucide="star"></i>
                        </button>
                        <form th:action="@{/movie/follow}" method="post">
                            <input type="hidden" name="movieId" th:value="${movie.id}" />
                            <button type="submit" th:class="${movie.isFollowed} ? 'green' : ''">
                                <i data-lucide="heart"></i>
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="separator"></div>

    <div th:if="${movie != null && movie.directing != null}" class="category-card">
        <div class="flex separate">
            <div class="flex gap centered">
                <div class="category">
                    <i data-lucide="clapperboard"></i>
                    <span th:text="${#strings.replace(#numbers.formatDecimal(movie.directing, 1, 2), ',', '.')}">0.00</span>
                </div>
                <div class="category">
                    <i data-lucide="camera"></i>
                    <span th:text="${#strings.replace(#numbers.formatDecimal(movie.cinematography, 1, 2), ',', '.')}">0.00</span>
                </div>
                <div class="category">
                    <i data-lucide="hat-glasses"></i>
                    <span th:text="${#strings.replace(#numbers.formatDecimal(movie.acting, 1, 2), ',', '.')}">0.00</span>
                </div>
                <div class="category">
                    <i data-lucide="music"></i>
                    <span th:text="${#strings.replace(#numbers.formatDecimal(movie.soundtrack, 1, 2), ',', '.')}">0.00</span>
                </div>
                <div class="category">
                    <i data-lucide="file-text"></i>
                    <span th:text="${#strings.replace(#numbers.formatDecimal(movie.screenplay, 1, 2), ',', '.')}">0.00</span>
                </div>
            </div>
            <form th:action="@{'/movies/delete/' + ${movie.id}}" method="post">
                <button type="submit" th:aria-label="#{movie.detail.delete.rating}">
                    <i data-lucide="trash"></i>
                </button>
            </form>
        </div>
    </div>



    <div th:replace="~{fragments/rate-movie-modal :: rateMovieModal(${movie})}"></div>
</div>
</body>
<script>
    lucide.createIcons();

    const btnOpenRateModal = document.getElementById('btnOpenRateModal');
    const btnCloseModal = document.getElementById('btnCloseModal');
    const rateModal = document.getElementById('rateModal');

    if (btnOpenRateModal) {
        btnOpenRateModal.addEventListener('click', () => {
            rateModal.classList.add('visible');
        });
    }

    if (btnCloseModal) {
        btnCloseModal.addEventListener('click', () => {
            rateModal.classList.remove('visible');
        });
    }

    if (rateModal) {
        rateModal.addEventListener('click', (e) => {
            if (e.target === rateModal) {
                rateModal.classList.remove('visible');
            }
        });
    }
</script>
</html>
