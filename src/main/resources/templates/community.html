<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{community.title}">Ratelog - Community</title>
    <link rel="stylesheet" href="/styles.css">
    <link rel="stylesheet" href="/community.css">
    <script src="/lucide.min.js"></script>
</head>
<body>
<div class="page-shell">
    <header class="site-header" th:replace="~{fragments/nav :: nav(active='community')}"></header>

    <main class="main-stack">
        <section class="hero-card">
            <div class="hero-content">
                <div>
                    <h1 class="hero-title" th:text="#{community.title}">Community.</h1>
                </div>
            </div>
        </section>

        <div class="community-grid">
            <section class="panel">
                <h2 class="section-heading-title" th:text="#{community.activity.feed}">Activity Feed</h2>

                <div th:if="${feed != null and !#lists.isEmpty(feed)}" class="feed-list">
                    <div th:each="item : ${feed}" class="feed-card">
                        <div class="feed-poster">
                            <img th:if="${item.posterPath != null}" th:src="@{'https://image.tmdb.org/t/p/w92' + ${item.posterPath}}" th:alt="'Poster of ' + ${item.title}" />
                            <div th:unless="${item.posterPath != null}" class="feed-poster-fallback" th:text="${#strings.toUpperCase(#strings.substring(item.title, 0, 1))}">?</div>
                        </div>
                        <div class="feed-info">
                            <div class="feed-user-row">
                                <div class="feed-user">
                                    <div class="feed-user-avatar" th:text="${#strings.toUpperCase(#strings.substring(item.username, 0, 1))}">U</div>
                                    <span class="feed-user-name" th:text="${item.username}">Username</span>
                                </div>
                                <div th:replace="~{fragments/score :: feedScoreBlock(${item.score})}"></div>
                            </div>
                            <div class="feed-content-row">
                                <span class="feed-title" th:text="${item.title}">Title</span>
                                <span th:if="${item.type == 'movie'}" class="tag tag-movie" th:text="#{community.type.movie}">Movie</span>
                                <span th:if="${item.type == 'tvshow'}" class="tag tag-tvshow" th:text="#{community.type.tv}">TV</span>
                                <span class="feed-date" th:text="${item.ratedAt}">Date</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div th:if="${feed != null and #lists.isEmpty(feed)}" class="empty-state" th:text="#{community.activity.empty}">No recent activity from users you follow.</div>
            </section>

            <aside class="community-sidebar">
                <section class="panel">
                    <h2 class="section-heading-title" th:text="#{community.search.users}">Search Users</h2>

                    <div th:if="${followError}" class="community-feedback error" th:text="${followError}"></div>

                    <div class="community-search-section">
                        <form th:action="@{/community}" method="get" class="community-search-form">
                            <input type="text" name="username" class="community-search-input" th:placeholder="#{community.search.placeholder}" autocomplete="off" th:value="${searchedUsername}" />
                            <button type="submit" class="ratelog-btn primary" th:title="#{community.search.users}">
                                <i data-lucide="search" aria-hidden="true"></i>
                            </button>
                        </form>
                    </div>

                    <div th:if="${users != null and !#lists.isEmpty(users)}" class="users-list">
                        <div th:each="user : ${users}" class="user-card">
                            <div class="user-avatar" th:text="${#strings.toUpperCase(#strings.substring(user.username, 0, 1))}">U</div>
                            <span class="user-username" th:text="${user.username}">Username</span>
                            <form th:action="@{/user/follow}" method="post" class="user-follow-form">
                                <input type="hidden" name="username" th:value="${user.username}" />
                                <input type="hidden" name="from" value="community" />
                                <button type="submit" class="ratelog-btn primary" th:title="${user.isFollowed} ? #{community.unfollow} : #{community.follow}">
                                    <i th:data-lucide="${user.isFollowed} ? 'user-round-x' : 'user-round-check'" aria-hidden="true"></i>
                                </button>
                            </form>
                        </div>
                    </div>
                </section>

                <div class="sidebar-separator"></div>

                <section class="panel">
                    <h2 class="section-heading-title" th:text="#{community.followed.users}">Followed Users</h2>

                    <div th:if="${followedUsers != null and !#lists.isEmpty(followedUsers)}" class="followed-users-list">
                        <div th:each="followedUser : ${followedUsers}" class="followed-user-item">
                            <span class="followed-user-username" th:text="${followedUser.username}">Username</span>
                            <form th:action="@{/user/follow}" method="post" class="followed-user-form">
                                <input type="hidden" name="username" th:value="${followedUser.username}" />
                                <input type="hidden" name="from" value="followed" />
                                <button type="submit" class="followed-user-unfollow" th:title="#{community.unfollow}">
                                    <i data-lucide="user-round-x" aria-hidden="true"></i>
                                </button>
                            </form>
                        </div>
                    </div>

                    <div th:if="${followedUsers != null and #lists.isEmpty(followedUsers)}" class="empty-state" th:text="#{community.followed.empty}">You are not following anyone yet.</div>
                </section>
            </aside>
        </div>
    </main>
</div>
</body>
<script>
    lucide.createIcons();
</script>
</html>
