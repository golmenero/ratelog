<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">
<head th:replace="~{fragments/head :: head(#{community.title})}"></head>
<body>
    <div th:replace="~{fragments/loader}"></div>
    <div class="page">
        <header class="site-header" th:replace="~{fragments/nav :: nav(active='community')}"></header>

        <h1 th:text="#{community.title}">Community.</h1>

        <div class="grid">
            <div>
                <h2 th:text="#{community.activity.feed}">Activity Feed</h2>

                <a th:href="${item.type == 'movie'} ? @{'/movie/' + ${item.tmdbId}} : @{'/tv/' + ${item.tmdbId}}" th:each="item : ${feed}" class="card">
                    <div>
                        <img th:if="${item.posterPath != null}" th:src="@{'https://image.tmdb.org/t/p/w92' + ${item.posterPath}}" th:alt="'Poster of ' + ${item.title}" />
                        <div>
                            <span class="username" th:text="${item.username}">Username</span>
                            <br>
                            <span class="title" th:text="${item.title}">Title</span>
                            <div class="tags">
                                <span th:if="${item.type == 'movie'}" class="tag" th:text="#{community.type.movie}">Movie</span>
                                <span th:if="${item.type == 'tvshow'}" class="tag" th:text="#{community.type.tv}">TV</span>
                            </div>
                        </div>
                    </div>
                    <div>
                        <span class="rating" th:text="${#strings.replace(#numbers.formatDecimal(item.score, 1, 2), ',', '.')}">0.00</span>
                        <br>
                        <span class="date" th:text="${item.ratedAt}">Rated at</span>
                    </div>
                </a>
            </div>

            <div>
                <h2 th:text="#{community.search.users}">Search Users</h2>
                <form th:action="@{/community}" method="get" class="filter">
                    <input type="text" name="username" th:placeholder="#{community.search.placeholder}" autocomplete="off" th:value="${searchedUsername}" />
                    <button type="submit" class="primary" th:title="#{community.search.users}">
                        <i data-lucide="search" aria-hidden="true"></i>
                    </button>
                </form>

                <div th:if="${users != null and !#lists.isEmpty(users)}">
                    <div th:each="user : ${users}" class="feed-card">
                        <form th:action="@{/user/follow}" method="post">
                            <span class="username" th:text="${user.username}">Username</span>
                            <input type="hidden" name="username" th:value="${user.username}" />
                            <input type="hidden" name="from" value="community" />
                            <button type="submit" th:title="${user.isFollowed} ? #{community.unfollow} : #{community.follow}">
                                <i th:data-lucide="${user.isFollowed} ? 'user-round-x' : 'user-round-check'" aria-hidden="true"></i>
                            </button>
                        </form>
                    </div>
                </div>

                <div class="separator"></div>

                <h2 th:text="#{community.followed.users}">Followed Users</h2>
                <div th:if="${followedUsers != null and !#lists.isEmpty(followedUsers)}">
                    <div th:each="followedUser : ${followedUsers}" class="feed-card">
                        <form th:action="@{/user/follow}" method="post">
                            <span class="username" th:text="${followedUser.username}">Username</span>
                            <input type="hidden" name="username" th:value="${followedUser.username}" />
                            <input type="hidden" name="from" value="followed" />
                            <button type="submit" th:title="#{community.unfollow}">
                                <i data-lucide="user-round-x" aria-hidden="true"></i>
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
