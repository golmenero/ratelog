<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{auth.login.title}">Ratelog - Login</title>
    <link rel="stylesheet" href="/styles.css">
    <script src="/lucide.min.js"></script>
</head>
<body>
<div class="page-shell">
    <header class="site-header" th:replace="~{fragments/nav :: nav(active='login')}"></header>

    <section class="auth-card">
        <img src="/img/logo-name.svg" th:alt="#{app.name}">
        <h2 th:text="#{auth.signin}">Sign in</h2>

        <div th:if="${param.error}"  class="feedback error" th:text="${auth.login.error}"></div>
        <div th:if="${param.logout}" class="feedback success" th:text="${auth.logout.success}"></div>

        <form th:action="@{/login/process}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

            <div class="form-group">
                <label for="username" th:text="#{auth.username.or.email}">Username or Email</label>
                <input type="text" id="username" name="username" required autofocus>
            </div>

            <div class="form-group">
                <label for="password" th:text="#{auth.password}">Password</label>
                <input type="password" id="password" name="password" required>
            </div>

            <button type="submit" class="primary full-width" th:text="#{auth.signin.btn}">Sign In</button>
        </form>

        <br>

        <div class="flex gap">
            <span th:text="#{auth.no.account}">Don't have an account?</span>
            <a class="link" th:href="@{/register}" th:text="#{auth.signup}">Sign up</a>
        </div>
    </section>
</div>
</body>
<script>
    lucide.createIcons();
</script>
</html>
