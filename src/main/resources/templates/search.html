<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">
<head th:replace="~{fragments/head :: head(#{search.title})}"></head>
<body>
<div th:replace="~{fragments/loader}"></div>
<div class="page">
    <header class="site-header" th:replace="~{fragments/nav :: nav(active='search')}"></header>

    <h1 th:text="#{search.hero}">Find movies and TV shows.</h1>

    <section class="panel">
        <form th:action="@{/}" class="filter" method="get">
            <input class="w-75" id="q" name="q" type="text" th:value="${query}" th:placeholder="#{search.placeholder}" autocomplete="off" th:aria-label="#{search.btn}">
            <button class="primary" type="submit" th:aria-label="#{search.btn}" th:title="#{search.btn}">
                <i data-lucide="search" aria-hidden="true"></i>
            </button>
        </form>

        <div th:if="${results != null}" id="results" class="results-grid">
            <div th:if="${#lists.isEmpty(results)}" class="card" th:text="#{search.empty}">Try with another title, year or original name.</div>

            <a th:each="item : ${results}"
               th:href="${item.type == 'movie'} ? @{/movie/{id}(id=${item.tmdbId})} : @{/tv/{id}(id=${item.tmdbId})}"
               class="result-card">
                <div class="poster-frame">
                    <span class="tag type-tag" th:text="${item.type == 'movie'} ? #{search.type.movie} : #{search.type.tv}">Type</span>
                    <img th:if="${item.posterPath != null}" th:src="@{'https://image.tmdb.org/t/p/w185' + ${item.posterPath}}" th:alt="'Poster of ' + ${item.title}">
                    <div th:unless="${item.posterPath != null}" class="poster-fallback" th:text="${#strings.toUpperCase(#strings.substring(item.title, 0, 1))}">?</div>
                </div>
                <div class="result-content">
                    <h3>
                        <span th:text="${item.title}">Title</span>
                        <span class="year" th:text="${item.year != null} ? ${item.year} : #{movies.year.unknown}">Year</span>
                    </h3>
                    <p class="result-overview" th:text="${item.overview != null and item.overview.trim().length() > 0} ? ${item.overview} : #{search.no.synopsis}">Overview</p>
                </div>
            </a>
        </div>
    </section>
</div>
</body>
</html>
