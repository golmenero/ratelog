<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raterr - Search</title>
    <link rel="stylesheet" href="/styles.css">
    <script src="/lucide.min.js"></script>
</head>
<body>
<div class="page-shell">
    <header class="site-header" th:replace="~{fragments/nav :: nav(active='search')}"></header>

    <main class="main-stack">
        <section class="hero-card">
            <div class="hero-content">
                <div>
                    <h1 class="hero-title">Find movies and TV shows.</h1>
                </div>
            </div>
        </section>

        <section class="panel">
            <div class="search-toolbar-centered">
                <div class="heading-filter search-inline">
                    <form th:action="@{/}" method="get" style="display: contents;">
                        <input id="q" name="q" type="text" th:value="${query}" placeholder="Search movies & TV shows" autocomplete="off" aria-label="Search">
                        <button class="raterr-btn primary" type="submit" aria-label="Search" title="Search">
                            <i data-lucide="search" aria-hidden="true"></i>
                        </button>
                    </form>
                </div>
            </div>
            
            <div th:if="${results != null}" id="results" class="results-grid">
                <div th:if="${#lists.isEmpty(results)}" class="empty-state">Try with another title, year or original name.</div>
                
                <a th:each="item : ${results}" th:if="${item.type == 'movie'}" th:href="@{/movie/{id}(id=${item.tmdbId})}" class="result-card result-card-link">
                    <div class="poster-frame">
                        <img th:if="${item.posterPath != null}" th:src="@{'https://image.tmdb.org/t/p/w185' + ${item.posterPath}}" th:alt="'Poster of ' + ${item.title}">
                        <div th:unless="${item.posterPath != null}" class="poster-fallback" th:text="${#strings.toUpperCase(#strings.substring(item.title, 0, 1))}">?</div>
                    </div>
                    <div class="result-content">
                        <div class="tag-row result-meta-row">
                            <span class="tag tag-movie">Movie</span>
                            <span class="tag" th:text="${item.year != null} ? ${item.year} : 'Unknown year'">Year</span>
                        </div>
                        <h3 class="result-title" th:text="${item.title}">Title</h3>
                        <p class="result-overview" th:text="${item.overview != null and item.overview.trim().length() > 0} ? ${item.overview} : 'No synopsis available right now.'">Overview</p>
                    </div>
                </a>

                <a th:each="item : ${results}" th:if="${item.type == 'tvshow'}" th:href="@{/tv/{id}(id=${item.tmdbId})}" class="result-card result-card-link">
                    <div class="poster-frame">
                        <img th:if="${item.posterPath != null}" th:src="@{'https://image.tmdb.org/t/p/w185' + ${item.posterPath}}" th:alt="'Poster of ' + ${item.title}">
                        <div th:unless="${item.posterPath != null}" class="poster-fallback" th:text="${#strings.toUpperCase(#strings.substring(item.title, 0, 1))}">?</div>
                    </div>
                    <div class="result-content">
                        <div class="tag-row result-meta-row">
                            <span class="tag tag-tvshow">TV</span>
                            <span class="tag" th:text="${item.year != null} ? ${item.year} : 'Unknown year'">Year</span>
                        </div>
                        <h3 class="result-title" th:text="${item.title}">Title</h3>
                        <p class="result-overview" th:text="${item.overview != null and item.overview.trim().length() > 0} ? ${item.overview} : 'No synopsis available right now.'">Overview</p>
                    </div>
                </a>
            </div>
        </section>
    </main>
</div>
</body>
<script>
    lucide.createIcons();
</script>
</html>
