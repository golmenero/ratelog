<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{auth.register.title}">Ratelog - Register</title>
    <link rel="stylesheet" href="/styles.css">
    <script src="/lucide.min.js"></script>
</head>
<body>
<div class="page-shell">
    <header class="site-header" th:replace="~{fragments/nav :: nav(active='register')}"></header>

    <main class="main-stack">
        <section class="auth-card">
            <img src="/img/logo-name.svg" th:alt="#{app.name}" class="auth-logo">
            <h1 class="auth-title" th:text="#{auth.create.account}">Create your account</h1>

            <div th:if="${error}" class="error-message" th:text="${error}"></div>

            <form th:action="@{/register}" method="post" class="auth-form">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                
                <div class="form-group">
                    <label for="username" th:text="#{auth.username}">Username</label>
                    <input type="text" id="username" name="username" required minlength="3" maxlength="50">
                </div>

                <div class="form-group">
                    <label for="email" th:text="#{auth.email}">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="form-group">
                    <label for="password" th:text="#{auth.password}">Password</label>
                    <input type="password" id="password" name="password" required minlength="8">
                </div>

                <button type="submit" class="primary full-width" th:text="#{auth.create.account.btn}">Create Account</button>
            </form>

            <p class="auth-footer">
                <span th:text="#{auth.have.account}">Already have an account?</span> <a th:href="@{/login}" th:text="#{auth.signin.link}">Sign in</a>
            </p>
        </section>
    </main>
</div>
</body>
<script>
    lucide.createIcons();
</script>
</html>
