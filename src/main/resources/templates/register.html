<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">
<head th:replace="~{fragments/head :: head(#{auth.register.title})}"></head>
<body>
<div th:replace="~{fragments/loader}"></div>
<div class="page">
    <header class="site-header" th:replace="~{fragments/nav :: nav(active='register')}"></header>

    <section class="generic-card centered">
        <h2 th:text="#{auth.create.account}">Create your account</h2>

        <div th:if="${error}"  class="feedback error" th:text="#{${error}}"></div>

        <form th:action="@{/register}" class="w-100" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

            <div class="form-group">
                <label for="username" th:text="#{auth.username}">Username</label>
                <input type="text" id="username" name="username" required minlength="3" maxlength="50">
            </div>

            <div class="form-group">
                <label for="email" th:text="#{auth.email}">Email</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div class="form-group">
                <label for="password" th:text="#{auth.password}">Password</label>
                <input type="password" id="password" name="password" required minlength="8">
            </div>

            <button type="submit" class="primary w-100" th:text="#{auth.create.account.btn}">Create Account</button>
        </form>

        <br>

        <div class="flex gap">
            <span th:text="#{auth.have.account}">Already have an account?</span>
            <a class="link" th:href="@{/login}" th:text="#{auth.signin.link}">Sign in</a>
        </div>
    </section>
</div>
</body>
</html>
